:root {

/* ── Base ────────────────────────────────────────────────────────── */
* { box-sizing: border-box; }

.text-white.relative.overflow-hidden.shrink-0 {

.sticky.top-0 button.text-lota {
  font-weight: 500 !important;

.sticky.top-0 button.text-lota::after {
  content: '';

  bottom: 6px;
  left: 50%; transform: translateX(-50%);
  width: 20px; height: 2px;

@keyframes slideUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

// ─── HISTORY VIEW ─────────────────────────────────────────────────────────────
function HistoryView({ entries, menu, setEntries, fieldNotes, setFieldNotes }) {
  const [expanded, setExpanded] = useState(null);
  const todayStr     = new Date().toISOString().split('T')[0];
  const currentMonth = todayStr.slice(0, 7);

  const grouped = entries.reduce((acc, e) => {
    if (!acc[e.date]) acc[e.date] = [];
    acc[e.date].push(e);
    return acc;
  }, {});
  const dates = Object.keys(grouped).sort((a,b) => b.localeCompare(a));

  if (dates.length === 0) {
    return (
      <div className="py-20 text-center text-ink-3 text-sm italic fade-in">
        No sales history yet.<br/>
        <span className="text-[11px] not-italic">Log your first entry on the Quick Entry tab.</span>
      </div>
    );
  }

  // ── #6 — 7-day bar chart data ──────────────────────────────────────────────
  const last7Days = Array.from({length: 7}, (_, i) => {
    const d = new Date(todayStr + 'T00:00:00');
    d.setDate(d.getDate() - (6 - i));
    const dayStr = d.toISOString().split('T')[0];
    const rev = (grouped[dayStr] || []).reduce((s, e) => s + e.revenue, 0);
    const label = d.toLocaleDateString('en-US', {weekday:'short'}).slice(0, 2);
    return { dayStr, rev, label };
  });
  const maxRev   = Math.max(...last7Days.map(d => d.rev), 1);
  const maxBarH  = 48, barBaseY = 64, slotW = 40, barW = 24;

  // ── Rolling stats ──────────────────────────────────────────────────────────
  const last7 = dates.filter(d => {
    const diff = (new Date(todayStr) - new Date(d + 'T00:00:00')) / 86400000;
    return diff >= 0 && diff <= 6;
  });
  const last7Total = last7.reduce((sum,d) => sum + grouped[d].reduce((s,e) => s+e.revenue, 0), 0);
  const last7Avg   = last7.length > 0 ? Math.round(last7Total / last7.length) : 0;
  const prev7 = dates.filter(d => {
    const diff = (new Date(todayStr) - new Date(d + 'T00:00:00')) / 86400000;
    return diff >= 7 && diff <= 13;
  });
  const prev7Total = prev7.reduce((sum,d) => sum + grouped[d].reduce((s,e) => s+e.revenue, 0), 0);
  const weekPct = prev7Total > 0 ? Math.round(((last7Total - prev7Total) / prev7Total) * 100) : null;
  const best = dates.reduce((b,d) => {
    const t = grouped[d].reduce((s,e) => s+e.revenue, 0);
    return t > b.t ? {d, t} : b;
  }, {d:null, t:0});

  // ── #7 — Category breakdown (current month) ────────────────────────────────
  const catRevenue = {};
  entries.filter(e => e.date.startsWith(currentMonth)).forEach(e => {
    Object.entries(e.items).forEach(([id, qty]) => {
      const item = menu.find(m => m.id === id);
      if (item) catRevenue[item.category] = (catRevenue[item.category] || 0) + qty * item.price;
    });
  });
  const catList    = Object.entries(catRevenue).sort((a,b) => b[1]-a[1]);
  const maxCatRev  = catList.length > 0 ? catList[0][1] : 1;
  const monthTotal = catList.reduce((s,[,v]) => s+v, 0);

  return (
    <div className="space-y-4 fade-in">

      {/* #6 — 7-day bar chart */}
      <div className="bg-white rounded-2xl border border-paper-3 p-4">
        <p className="text-[10px] uppercase tracking-widest text-ink-3 mb-3">Last 7 Days</p>
        <svg width="100%" viewBox="0 0 280 82" preserveAspectRatio="xMidYMid meet">
          {last7Days.map((d, i) => {
            const barH  = d.rev > 0 ? Math.max(3, (d.rev / maxRev) * maxBarH) : 2;
            const isToday = d.dayStr === todayStr;
            const barX  = i * slotW + (slotW - barW) / 2;
            const barY  = barBaseY - barH;
            const rev$  = d.rev >= 1000 ? `${(d.rev/1000).toFixed(1)}k` : d.rev > 0 ? String(d.rev) : '';
            return (
              <g key={d.dayStr}>
                <rect x={barX} y={barY} width={barW} height={barH} rx={4}
                  fill={isToday ? '#c4722a' : '#e2dcd0'}/>
                <text x={i*slotW+slotW/2} y={79} fontSize={9} textAnchor="middle"
                  fill={isToday ? '#c4722a' : '#9a958f'} fontFamily="DM Mono,monospace">
                  {d.label}
                </text>
                {rev$ && barH > 10 && (
                  <text x={i*slotW+slotW/2} y={barY-3} fontSize={8} textAnchor="middle"
                    fill={isToday ? '#c4722a' : '#9a958f'} fontFamily="DM Mono,monospace">
                    {rev$}
                  </text>
                )}
              </g>
            );
          })}
        </svg>
      </div>

      {/* Quick stats */}
      <div className="grid grid-cols-3 gap-2">
        {[
          {label:'7-Day Total', value:`₱${last7Total.toLocaleString()}`, accent:true,
           sub: weekPct !== null ? `${weekPct >= 0 ? '+' : ''}${weekPct}% vs last wk` : null,
           subUp: weekPct !== null && weekPct >= 0},
          {label:'Daily Avg',   value:`₱${last7Avg.toLocaleString()}`,   accent:false},
          {label:'Days Logged', value:String(dates.length),              accent:false},
        ].map(({label,value,accent,sub,subUp}) => (
          <div key={label} className="bg-white rounded-xl border border-paper-3 p-3 text-center">
            <p className="text-[9px] uppercase tracking-widest text-ink-3 mb-1">{label}</p>
            <p className={`text-base font-serif ${accent ? 'text-lota' : 'text-ink'}`}>{value}</p>
            {sub && (
              <p className="text-[9px] mt-0.5 font-medium" style={{color: subUp ? '#6a9e6a' : '#b56a5a'}}>
                {sub}
              </p>
            )}
          </div>
        ))}
      </div>

      {best.d && (
        <div className="bg-lota-3 border border-lota/20 rounded-xl px-4 py-3 flex justify-between items-center">
          <p className="text-[10px] uppercase tracking-widest text-lota-2">Best Day</p>
          <div className="text-right">
            <p className="text-sm font-serif font-bold text-lota">₱{best.t.toLocaleString()}</p>
            <p className="text-[10px] text-lota-2">{new Date(best.d+'T12:00:00').toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'})}</p>
          </div>
        </div>
      )}

      {/* #7 — Category breakdown (this month) */}
      {catList.length > 0 && (
        <div className="bg-white rounded-2xl border border-paper-3 p-4">
          <div className="flex justify-between items-baseline mb-3">
            <p className="text-[10px] uppercase tracking-widest text-ink-3">This Month by Category</p>
            <p className="text-xs font-serif text-ink-2">₱{monthTotal.toLocaleString()}</p>
          </div>
          <div className="space-y-2.5">
            {catList.map(([cat, rev]) => (
              <div key={cat}>
                <div className="flex justify-between text-[10px] mb-1">
                  <span className="text-ink-2 truncate pr-2">{cat}</span>
                  <span className="text-ink-3 shrink-0">₱{rev.toLocaleString()}</span>
                </div>
                <div className="h-1.5 bg-paper-3 rounded-full overflow-hidden">
                  <div className="h-full rounded-full transition-all duration-500"
                    style={{width:`${Math.round((rev/maxCatRev)*100)}%`, backgroundColor:'var(--color-lota)'}}/>
                </div>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* Day list */}
      {dates.map(date => {
        const dayEntries = grouped[date];
        const dayTotal   = dayEntries.reduce((s,e) => s+e.revenue, 0);
        const isToday    = date === todayStr;
        const isExpanded = expanded === date;
        const label      = isToday
          ? 'Today'
          : new Date(date+'T12:00:00').toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});

        const itemMap = dayEntries.reduce((acc,e) => {
          Object.entries(e.items).forEach(([id,q]) => { acc[id]=(acc[id]||0)+q; });
          return acc;
        }, {});
        const breakdown = Object.entries(itemMap)
          .map(([id,qty]) => ({item:menu.find(m=>m.id===id), qty, total:(menu.find(m=>m.id===id)?.price||0)*qty}))
          .filter(x=>x.item).sort((a,b)=>b.qty-a.qty);
        const totalItems = Object.values(itemMap).reduce((a,b)=>a+b,0);

        return (
          <div key={date} className="bg-white rounded-xl border border-paper-3 overflow-hidden">
            <button onClick={() => setExpanded(isExpanded ? null : date)}
              className="w-full px-4 py-3 flex justify-between items-center active:bg-paper-2 transition-colors">
              <div className="text-left">
                <p className={`text-sm font-medium ${isToday ? 'text-lota' : 'text-ink'}`}>{label}</p>
                <p className="text-[10px] text-ink-3 mt-0.5">
                  {dayEntries.length} {dayEntries.length===1?'save':'saves'} · {totalItems} items sold
                </p>
              </div>
              <div className="flex items-center gap-3">
                <p className="text-lg font-serif" style={{color:'var(--color-lota)'}}>₱{dayTotal.toLocaleString()}</p>
                {isExpanded ? <ChevUp size={14} className="text-ink-3"/> : <ChevDown size={14} className="text-ink-3"/>}
              </div>
            </button>

            {isExpanded && (
              <div className="border-t border-paper-3">
                {breakdown.map(({item,qty,total}) => (
                  <div key={item.id} className="px-4 py-2.5 flex justify-between items-center border-b border-paper-3 last:border-0">
                    <div className="flex items-center gap-2.5">
                      <div className="w-5 h-5 rounded-full flex items-center justify-center text-[10px] font-bold text-white shrink-0"
                        style={{backgroundColor:'var(--color-lota)'}}>{qty}</div>
                      <div>
                        <p className="text-sm text-ink">{item.name}</p>
                        <p className="text-[9px] text-ink-3 uppercase tracking-wide">{item.category}</p>
                      </div>
                    </div>
                    <p className="text-sm font-serif text-ink-2">₱{total.toLocaleString()}</p>
                  </div>
                ))}
                <div className="px-4 py-2.5 bg-paper-2 flex justify-between items-center border-t border-paper-3">
                  <span className="text-[10px] uppercase tracking-widest font-bold text-ink-2">Day Total</span>
                  <span className="text-sm font-serif font-bold" style={{color:'var(--color-lota)'}}>₱{dayTotal.toLocaleString()}</span>
                </div>
                <div className="bg-paper px-4 py-2 space-y-1">
                  {dayEntries.slice().reverse().map(entry => (
                    <div key={entry.id} className="flex justify-between items-start py-1.5 border-b border-paper-3 last:border-0">
                      <div>
                        <p className="text-[10px] text-ink-3">
                          {new Date(parseInt(entry.id)).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}
                        </p>
                        <p className="text-xs text-ink-2">₱{entry.revenue.toLocaleString()}</p>
                        {entry.notes && (
                          <p className="text-[10px] text-ink-3 italic mt-0.5">"{entry.notes}"</p>
                        )}
                      </div>
                      <button
                        onClick={() => { if(confirm('Delete this entry?')) setEntries(p=>p.filter(e=>e.id!==entry.id)); }}
                        className="p-2 text-ink-3 hover:text-red-500 active:text-red-600 transition-colors shrink-0">
                        <Trash2 size={14}/>
                      </button>
                    </div>
                  ))}
                </div>
                {/* Field note for this day */}
                <div className="border-t border-paper-3 px-4 py-3" style={{backgroundColor:'var(--color-lota-3)'}}>
                  <div className="flex items-center gap-1.5 mb-2">
                    <PenIco size={11} className="text-lota"/>
                    <span className="text-[9px] uppercase tracking-widest text-lota-2 font-bold">Field Note</span>
                  </div>
                  {setFieldNotes ? (
                    <textarea
                      value={(fieldNotes && fieldNotes[date]) || ''}
                      onChange={e => setFieldNotes(prev => ({...prev, [date]: e.target.value}))}
                      placeholder="Add a note for this day…"
                      rows={2}
                      style={{
                        width:'100%', background:'transparent', border:'none', outline:'none',
                        resize:'none', fontSize:12, lineHeight:'1.6', color:'var(--color-ink)',
                        fontFamily:'inherit',
                      }}
                    />
                  ) : (
                    fieldNotes && fieldNotes[date]
                      ? <p className="text-xs text-ink-2 italic leading-relaxed">{fieldNotes[date]}</p>
                      : <p className="text-[11px] text-ink-3 italic">No note for this day.</p>
                  )}
                </div>
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

// ─── MAIN SALES TRACKER ───────────────────────────────────────────────────────
function SalesTracker() {
  const importRef = useRef(null);

  // ── Core state ──────────────────────────────────────────────────────────────
  const [menu, setMenu] = useState(() => {
    try { const s = localStorage.getItem('lota_menu_v5'); return s ? JSON.parse(s) : DEFAULT_MENU; } catch(e) { return DEFAULT_MENU; }
  });
  const [entries, setEntries] = useState(() => {
    try { const s = localStorage.getItem('lota_sales_v3'); return s ? JSON.parse(s) : []; } catch(e) { return []; }
  });
  const [view,           setView]           = useState('entry');
  const [isEditingMenu,  setIsEditingMenu]  = useState(false);
  const [entryDate,      setEntryDate]      = useState(new Date().toISOString().split('T')[0]);
  const [quantities,     setQuantities]     = useState({});
  const [activeCategory, setActiveCategory] = useState('Coffee');
  const [newItem,        setNewItem]        = useState({name:'',price:'',category:'Coffee'});
  const [editPriceId,    setEditPriceId]    = useState(null);
  const [editPriceVal,   setEditPriceVal]   = useState('');
  const [toast,          setToast]          = useState(null);

  // ── Feature state ────────────────────────────────────────────────────────────
  const [dailyTarget, setDailyTarget] = useState(() => {
    try { return parseInt(localStorage.getItem('lota_target_v1')) || 0; } catch(e) { return 0; }
  });
  const [soldOutIds, setSoldOutIds] = useState(() => {
    try {
      const s = localStorage.getItem('lota_soldout_v1');
      if (!s) return [];
      const d = JSON.parse(s);
      const today = new Date().toISOString().split('T')[0];
      return d.date === today ? (d.ids || []) : [];
    } catch(e) { return []; }
  });
  const [entryNote,          setEntryNote]          = useState('');
  const [itemSearch,         setItemSearch]         = useState('');
  const [dismissedYestCard,  setDismissedYestCard]  = useState(false);
  const [splashVisible,      setSplashVisible]      = useState(true);
  const [splashFading,       setSplashFading]       = useState(false);
  const [splashImgReady,     setSplashImgReady]     = useState(false);
  const [pinMode,            setPinMode]            = useState(() => localStorage.getItem('lota_pin') ? 'enter' : 'setup');
  const [pinInput,           setPinInput]           = useState('');
  const [pinFirstEntry,      setPinFirstEntry]      = useState('');
  const [pinError,           setPinError]           = useState(false);
  const [darkMode,           setDarkMode]           = useState(() => {
    const s = localStorage.getItem('lota_dark');
    if (s !== null) return s === '1';
    return window.matchMedia('(prefers-color-scheme: dark)').matches;
  });
  const [fieldNotes,         setFieldNotes]         = useState(() => {
    try { const s = localStorage.getItem('lota_fieldnotes_v1'); return s ? JSON.parse(s) : {}; } catch(e) { return {}; }
  });

  // ── Persistence effects ──────────────────────────────────────────────────────
  useEffect(() => { localStorage.setItem('lota_menu_v5',   JSON.stringify(menu));    }, [menu]);
  useEffect(() => { localStorage.setItem('lota_sales_v3',  JSON.stringify(entries)); }, [entries]);
  useEffect(() => { localStorage.setItem('lota_target_v1', String(dailyTarget));     }, [dailyTarget]);
  useEffect(() => {
    localStorage.setItem('lota_dark', darkMode ? '1' : '0');
    document.documentElement.classList.toggle('dark', darkMode);
  }, [darkMode]);
  useEffect(() => { localStorage.setItem('lota_fieldnotes_v1', JSON.stringify(fieldNotes)); }, [fieldNotes]);
  const handlePinKey = useCallback((key) => {
    if (pinError) return;
    if (key === '⌫') { setPinInput(p => p.slice(0, -1)); return; }
    const next = pinInput + String(key);
    if (next.length > 4) return;
    setPinInput(next);
    if (next.length < 4) return;
    // Full PIN entered — evaluate after a tiny delay so last dot renders
    setTimeout(() => {
      if (pinMode === 'enter') {
        if (next === localStorage.getItem('lota_pin')) {
          setSplashFading(true);
          setTimeout(() => setSplashVisible(false), 600);
        } else {
          setPinError(true);
          setTimeout(() => { setPinError(false); setPinInput(''); }, 700);
        }
      } else if (pinMode === 'setup') {
        setPinFirstEntry(next); setPinMode('confirm'); setPinInput('');
      } else if (pinMode === 'confirm') {
        if (next === pinFirstEntry) {
          localStorage.setItem('lota_pin', next);
          setSplashFading(true);
          setTimeout(() => setSplashVisible(false), 600);
        } else {
          setPinError(true);
          setTimeout(() => { setPinError(false); setPinInput(''); setPinMode('setup'); setPinFirstEntry(''); }, 700);
        }
      }
    }, 80);
  }, [pinInput, pinError, pinMode, pinFirstEntry]);
  useEffect(() => {
    const today = new Date().toISOString().split('T')[0];
    localStorage.setItem('lota_soldout_v1', JSON.stringify({ date: today, ids: soldOutIds }));
  }, [soldOutIds]);
  // Fallback: if image never loads/errors, show PIN after 3s anyway
  useEffect(() => {
    if (splashVisible && !splashImgReady) {
      const t = setTimeout(() => setSplashImgReady(true), 3000);
      return () => clearTimeout(t);
    }
  }, [splashVisible, splashImgReady]);

  const showToast = useCallback((msg) => {
    setToast(msg);
    setTimeout(() => setToast(null), 2500);
  }, []);

  // ── Computed values ──────────────────────────────────────────────────────────
  const todayStr     = new Date().toISOString().split('T')[0];
  const currentMonth = todayStr.slice(0, 7);
  const todaySales   = entries.filter(e=>e.date===todayStr).reduce((s,e)=>s+e.revenue, 0);
  const monthSales   = entries.filter(e=>e.date.startsWith(currentMonth)).reduce((s,e)=>s+e.revenue, 0);
  const cats         = [...new Set(menu.map(m => m.category))];

  // Top sellers — auto-sorted by all-time qty, top 8
  const topSellers = (() => {
    const counts = {};
    entries.forEach(e => Object.entries(e.items).forEach(([id,qty]) => { counts[id]=(counts[id]||0)+qty; }));
    return Object.entries(counts)
      .sort((a,b) => b[1]-a[1])
      .slice(0, 8)
      .map(([id]) => menu.find(m=>m.id===id))
      .filter(Boolean);
  })();
  const allCats = topSellers.length > 0 ? ['★ Faves', ...cats] : cats;

  const toggleSoldOut = (id) => setSoldOutIds(prev =>
    prev.includes(id) ? prev.filter(x=>x!==id) : [...prev, id]
  );
  const isSoldOut = (id) => soldOutIds.includes(id);

  // ── Entry logic ──────────────────────────────────────────────────────────────
  const handleQty = (id, delta) => setQuantities(prev => {
    const cur = prev[id]||0, next = Math.max(0, cur+delta);
    if (!next) { const {[id]:_, ...rest} = prev; return rest; }
    return {...prev, [id]: next};
  });
  const calcRevenue = Object.entries(quantities).reduce((sum,[id,qty]) => sum+((menu.find(m=>m.id===id)?.price||0)*qty), 0);
  const totalItems  = Object.values(quantities).reduce((a,b) => a+b, 0);

  const saveEntry = () => {
    if (!Object.keys(quantities).length) return;
    const saved = calcRevenue;
    setEntries(prev => [
      ...prev,
      {id:Date.now().toString(), date:entryDate, items:{...quantities}, revenue:saved, notes:entryNote.trim()}
    ].sort((a,b) => b.date.localeCompare(a.date)));
    setQuantities({});
    setEntryNote('');
    setView('summary');
    showToast(`₱${saved.toLocaleString()} saved!`);
  };

  const todayEntries  = entries.filter(e => e.date===todayStr);

  // Yesterday close card
  const yesterdayStr = (() => {
    const d = new Date(todayStr + 'T12:00:00'); d.setDate(d.getDate() - 1);
    return d.toISOString().split('T')[0];
  })();
  const yesterdayEntries = entries.filter(e => e.date === yesterdayStr);
  const yesterdayTotal   = yesterdayEntries.reduce((s,e) => s+e.revenue, 0);
  const yesterdayItemMap = yesterdayEntries.reduce((acc,e) => {
    Object.entries(e.items).forEach(([id,q]) => { acc[id]=(acc[id]||0)+q; }); return acc;
  }, {});
  const topYestEntry = Object.entries(yesterdayItemMap).sort((a,b)=>b[1]-a[1])[0];
  const topYestItem  = topYestEntry ? menu.find(m=>m.id===topYestEntry[0]) : null;

  const todayItemMap  = todayEntries.reduce((acc,e) => {
    Object.entries(e.items).forEach(([id,q]) => { acc[id]=(acc[id]||0)+q; });
    return acc;
  }, {});
  const sortedSummary = Object.entries(todayItemMap)
    .map(([id,qty]) => ({item:menu.find(m=>m.id===id), qty, total:(menu.find(m=>m.id===id)?.price||0)*qty}))
    .filter(x=>x.item).sort((a,b)=>b.qty-a.qty);

  // #9 — today's total items for Summary tab badge
  const todayTotalItems = Object.values(todayItemMap).reduce((a,b) => a+b, 0);
  const todayNote = fieldNotes[todayStr] || '';

  // #8 — per-item monthly stats for settings
  const itemMonthStats = (() => {
    const stats = {};
    entries.filter(e => e.date.startsWith(currentMonth)).forEach(e => {
      Object.entries(e.items).forEach(([id, qty]) => {
        if (!stats[id]) stats[id] = { qty: 0, revenue: 0 };
        stats[id].qty += qty;
        stats[id].revenue += qty * (menu.find(m => m.id === id)?.price || 0);
      });
    });
    return stats;
  })();

  // Export CSV (includes ID column for reliable re-import)
  const exportCSV = () => {
    const rows = [['ID','Date','Time','Revenue','Notes','Items']];
    [...entries].sort((a,b)=>a.date.localeCompare(b.date)).forEach(e => {
      const time  = new Date(parseInt(e.id)).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
      const items = Object.entries(e.items).map(([id,q])=>`${q}x ${menu.find(m=>m.id===id)?.name||id}`).join('; ');
      rows.push([e.id, e.date, time, e.revenue, e.notes||'', items]);
    });
    const csv  = rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
    const blob = new Blob([csv],{type:'text/csv'});
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href=url; a.download=`lota-sales-${todayStr}.csv`; a.click();
    URL.revokeObjectURL(url);
    showToast('CSV exported!');
  };

  // #10 — Share day summary
  const shareSummary = () => {
    const dateStr  = new Date(todayStr+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'});
    const topItems = sortedSummary.slice(0,3).map(({item,qty})=>`${item.name} x${qty}`).join(', ');
    const text     = `${dateStr} · ₱${todaySales.toLocaleString()} · ${todayTotalItems} items sold${topItems ? ` · Top: ${topItems}` : ''}`;
    if (navigator.share) {
      navigator.share({text}).catch(()=>{});
    } else {
      navigator.clipboard?.writeText(text)
        .then(()=>showToast('Copied to clipboard!'))
        .catch(()=>showToast('Could not copy'));
    }
  };

  // #11 — Import CSV
  const importCSV = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const lines = ev.target.result.split('\n').filter(l=>l.trim());
        const header = lines[0].toLowerCase();
        const hasIdCol = header.startsWith('"id"') || header.startsWith('id,') || header.startsWith('id"');
        const rows = lines.slice(1);
        const existingIds = new Set(entries.map(e=>e.id));
        const newEntries = [];

        rows.forEach(row => {
          // Simple quoted-CSV parser
          const cols = [];
          let cur = '', inQ = false;
          for (const ch of row) {
            if (ch==='"') { inQ=!inQ; }
            else if (ch===',' && !inQ) { cols.push(cur); cur=''; }
            else { cur+=ch; }
          }
          cols.push(cur);

          let id, date, revenue, notes, itemsStr;
          if (hasIdCol) {
            [id, date, , revenue, notes, itemsStr] = cols;
          } else {
            [date, , revenue, notes, itemsStr] = cols;
            id = null;
          }
          date = (date||'').trim();
          if (!date || !/^\d{4}-\d{2}-\d{2}$/.test(date)) return;

          const entryId = (id && id.trim())
            ? id.trim()
            : String(new Date(date+'T12:00:00').getTime() + Math.round(Math.random()*9999));
          if (existingIds.has(entryId)) return;

          const items = {};
          if (itemsStr) {
            itemsStr.split(';').forEach(s => {
              const m = s.trim().match(/^(\d+)x\s+(.+)$/);
              if (m) {
                const mi = menu.find(x=>x.name===m[2].trim());
                if (mi) items[mi.id] = parseInt(m[1]);
              }
            });
          }
          newEntries.push({id:entryId, date, items, revenue:parseFloat(revenue)||0, notes:(notes||'').trim()});
        });

        if (newEntries.length > 0) {
          setEntries(prev=>[...prev,...newEntries].sort((a,b)=>b.date.localeCompare(a.date)));
          showToast(`${newEntries.length} entr${newEntries.length===1?'y':'ies'} imported!`);
        } else {
          showToast('Nothing new to import.');
        }
      } catch(err) {
        showToast('Import failed — check CSV format.');
      }
    };
    reader.readAsText(file);
    e.target.value = '';
  };

  // Items visible in Quick Entry — search overrides category filter
  const visibleItems = itemSearch.trim()
    ? menu.filter(m => m.name.toLowerCase().includes(itemSearch.trim().toLowerCase()))
    : activeCategory === '★ Faves'
      ? topSellers
      : menu.filter(m => m.category === activeCategory);

  // ── RENDER ───────────────────────────────────────────────────────────────────

  return (
    <div className="flex flex-col bg-paper min-h-screen">

      {/* ── SPLASH + LOGIN ──────────────────────────────────────────────────── */}
      {splashVisible && (
        <div className="fixed inset-0 z-50 flex flex-col overflow-y-auto"
          style={{
            backgroundColor: '#e0d9cb',
            transition: 'opacity 0.6s ease',
            opacity: splashFading ? 0 : 1,
            paddingTop: 'env(safe-area-inset-top, 0px)',
            paddingBottom: 'env(safe-area-inset-bottom, 0px)',

                      <button
                        onClick={() => { if(confirm('Delete this entry?')) setEntries(p=>p.filter(e=>e.id!==entry.id)); }}
                        className="p-2 text-ink-3 hover:text-red-500 active:text-red-600 transition-colors">
                        <Trash2 size={14}/>
                      </button>
                    </div>
                    <div className="flex flex-wrap gap-1">
                      {Object.entries(entry.items).map(([id,q]) => {
                        const it = menu.find(m=>m.id===id);
                        return <span key={id} className="px-2 py-0.5 bg-paper-2 rounded-full text-[10px] text-ink-2">{q}× {it?.name}</span>;
                      })}
                    </div>
                    {entry.notes && (
                      <p className="text-[10px] text-ink-3 italic mt-2">"{entry.notes}"</p>
                    )}
                  </div>
                ))}
              </div>
            )}
          </div>
        )}

        {/* ─ HISTORY ─ */}
        {!isEditingMenu && view==='history' && (
          <HistoryView entries={entries} menu={menu} setEntries={setEntries} fieldNotes={fieldNotes} setFieldNotes={setFieldNotes}/>
        )}
      </div>

      {/* ── STICKY SAVE BAR ─────────────────────────────────────────────────── */}
      {Object.keys(quantities).length > 0 && view==='entry' && !isEditingMenu && (
        <div className="fixed bottom-0 left-0 right-0 bg-paper border-t border-paper-3 px-4 pt-3 z-30 shadow-xl slide-up"
          style={{paddingBottom:'max(16px, env(safe-area-inset-bottom, 16px))'}}>
          <div className="flex justify-between items-center mb-2.5">
            <div>
              <p className="text-[10px] uppercase tracking-widest text-ink-3 mb-0.5">Running Total</p>
              <p className="font-serif text-2xl text-ink">₱{calcRevenue.toLocaleString()}</p>
            </div>
            <div className="flex items-center gap-4">
              <div className="text-right">
                <p className="text-[10px] uppercase tracking-widest text-ink-3 mb-0.5">Items</p>
                <p className="font-serif text-2xl text-ink">{totalItems}</p>
              </div>
              <button onClick={() => setQuantities({})}
                className="text-[10px] uppercase tracking-widest text-ink-3 hover:text-red-400 active:text-red-500 transition-colors border-b border-ink-3/30 pb-px">
                Clear
              </button>
            </div>
          </div>
          <input type="text" placeholder="Add a note… rainy day, out of cold brew, etc."
            value={entryNote}
            onChange={e => setEntryNote(e.target.value)}
            className="w-full bg-paper-2 border border-paper-3 px-3 py-2 rounded-lg text-xs outline-none focus:border-ink mb-2.5 text-ink placeholder:text-ink-3 transition-colors"/>
          <button onClick={saveEntry}
            className="w-full py-3 text-white rounded-xl text-[11px] uppercase tracking-widest font-bold transition-opacity hover:opacity-90 active:opacity-75"
            style={{backgroundColor:'var(--color-lota)'}}>
            Save Entry
          </button>
        </div>
      )}

      {/* ── TOAST ───────────────────────────────────────────────────────────── */}
      {toast && (
        <div className="fixed bottom-28 left-1/2 -translate-x-1/2 z-50 bg-ink text-paper px-5 py-2.5 rounded-full text-xs font-medium shadow-xl tracking-wide fade-in whitespace-nowrap">
          {toast}
        </div>
      )}
    </div>
  );
}

// ─── APP SHELL ────────────────────────────────────────────────────────────────
function App() {
  useEffect(() => {
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js').catch(() => {});
    }
  }, []);
  return <SalesTracker/>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
